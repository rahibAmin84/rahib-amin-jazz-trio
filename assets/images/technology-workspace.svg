    <circle cx="120" cy="210" r="10"/><circle cx="430" cy="280" r="10"/><circle cx="790" cy="200" r="10"/>
    <circle cx="130" cy="420" r="10"/><circle cx="520" cy="330" r="10"/><circle cx="760" cy="390" r="10"/>
    <circle cx="160" cy="640" r="10"/><circle cx="490" cy="520" r="10"/><circle cx="830" cy="610" r="10"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#f6efe4" opacity="0.86">
    <text x="120" y="755" font-size="34">policy.enforced()</text>
    <text x="120" y="805" font-size="34">attestation.verified()</text>
    <text x="120" y="855" font-size="34">evidence.generated()</text>
  </g>
